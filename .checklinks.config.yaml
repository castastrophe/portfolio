# broken-link-checker configuration
# https://github.com/stevenvachon/broken-link-checker

url: https://allons-y.llc

# URL patterns to suppress — plain substrings, not globs
excludedKeywords:
  - localhost
  - stackoverflow.com
  - codepen.io
  - linkedin.com
  - docs.github.com
  - patreon.com

# 0 = clickable links only  1 = clickable + srcset/media (default)
# 2 = all link-like attrs   3 = all + scripts/stylesheets
filterLevel: 1

# Respect robots.txt exclusion rules
honorRobotExclusions: true

# Maximum concurrent connections per host (default: 1)
maxSocketsPerHost: 1

# Milliseconds to wait between requests (default: 0)
rateLimit: 0

# Use HEAD requests first; falls back to GET on 405
requestMethod: head

# hyperlink settings for internal link checking
internal:
  canonicalRoot: https://allons-y.llc/
  root: public/
  entry: public/index.html
  skip:
    - .css.map
    - .js.map
    - feed.atom
    - fonts.googleapis.com
    - fonts.gstatic.com
