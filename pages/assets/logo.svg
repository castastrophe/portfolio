}

.color2 {
fill: hsl(192, 70%, 70%);
}

.color3 {
fill: hsl(336, 65%, 50%);
}

.color4 {
fill: hsl(42, 100%, 70%);
}

.shade1 {
fill: color-mix(in srgb, #e7e3d6 100%, black 10%);
}

.coffee {
