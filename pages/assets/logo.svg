}

.swirl {
stroke-color: color-mix(in srgb, #c2b1a6 90%, black 60%);
stroke-width: 5;
stroke-opacity: .7;

transform-box: stroke-box;
transform: translateX(-5px) translateY(-5px);
}

.subtle {
stroke: color-mix(in srgb, #c2b1a6 90%, black 90%);
stroke-width: 10;
stroke-opacity: .1;
}

.with-fill {
fill: #e7e3d6;
fill-opacity: 1;
}

.color1 {
