<svg id="background" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg"
    style="width: auto; height: 100vh; overflow: visible; position: fixed; top: 0; left: 0; z-index: -1;">
    <style>
        :root,
        :is(.accent--orange, .accent--blue, .accent--yellow) {
            --color-primary: var(--theme--surface--color--accent);
        }

        :root {
            --layer-1: 0.5;
            --layer-2: 0.45;
            --layer-3: 0.4;
            --layer-4: 0.35;
            --layer-5: 0.3;
            --layer-6: 0.2;
            --layer-7: 0.1;
        }

        /* Scroll-driven animations for SVG elements */
        @media not (prefers-reduced-motion: reduce) {
            @supports (animation-timeline: scroll()) {
                :is(.pulse, .draw) {
                    animation-timeline: scroll(block root);
                    animation-range-start: 0%;
                    animation-range-end: 70%;
                }

                .fade {
                    animation-timeline: scroll(block root);
                    animation-range-start: calc(var(--visible-timing, 0) * 100%);
                    animation-range-end: 100%;
                }
            }

            @supports not (animation-timeline: scroll()) {
                :is(.draw) {
                    animation-duration: 10s;
                }
                :is(.pulse) {
                    animation-duration: 5s;
                    animation-iteration-count: infinite;
                }
                :is(.fade) {
                    animation-duration: calc(var(--visible-timing, 1) * 10s);
                }
            }

            :is(.pulse, .draw, .fade) {
                animation-timing-function: linear;
                animation-direction: normal;
                transform-origin: center;
                animation-fill-mode: forwards;

                &:is(.reverse) {
                    animation-direction: reverse;
                }
            }

            .pulse {
                animation-name: pulse;
                transform-box: stroke-box;
            }

            .draw {
                stroke-dashoffset: 100vw;
                stroke-dasharray: 100vw;
                animation-name: draw;
            }

            .fade {
                animation-name: fade;
                opacity: 0;
            }
        }

        @keyframes pulse {
            70% {
                transform: scale(1.3) translate(0, 0);
            }
        }

        @keyframes draw {
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fade {
            to {
                opacity: 1;
            }
        }

        #accentGradient {
            stop {
                stop-color: var(--color-primary);
                stop-opacity: 1;
            }
        }
    </style>

    <defs>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"/>
            <stop offset="100%" class="accent--yellow"/>
        </linearGradient>

        <!-- Glow effect -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Large, layered circle -->
    <g class="accent--yellow">
        <circle class="accent--orange" cx="950" cy="100" r="60" fill="none" stroke="var(--color-primary)" opacity="var(--layer-4)" stroke-width="10" />
        <circle cx="950" cy="100" r="80" fill="none" stroke="var(--color-primary)" opacity="var(--layer-3)" stroke-width="3" />
        <circle class="accent--orange" cx="950" cy="100" r="100" fill="none" stroke="var(--color-primary)" opacity="var(--layer-4)" stroke-width="2" />
        <circle cx="950" cy="100" r="180" fill="none" stroke="var(--color-primary)" opacity="var(--layer-5)" stroke-width="150" />
        <circle class="accent--orange" cx="950" cy="100" r="180" fill="none" stroke="var(--color-primary)" opacity="var(--layer-4)" stroke-width="2" />
        <circle class="accent--orange" cx="950" cy="100" r="260" fill="none" stroke="var(--color-primary)" opacity="var(--layer-3)" stroke-width="10" />
    </g>

    <!-- Bottom, left triangle -->
    <polygon class="accent--yellow pulse"  points="100,300 200,250 180,350" fill="var(--color-primary)" opacity="var(--layer-3)" stroke="var(--color-primary)" stroke-width="5"/>

    <!-- Flowing connection lines -->
    <g class="accent--blue">
        <path class="draw" d="M -5 80 Q 400 190 800 280 T 1205 370" fill="none" stroke="var(--color-primary)" opacity="var(--layer-3)" stroke-width="1.5" />
        <circle class="fade" style="--visible-timing:calc(150/400)" cx="260" cy="150" r="5" fill="var(--color-primary)" opacity="var(--layer-1)"/>
        <circle class="fade pulse" style="--visible-timing:calc(285/400)" cx="820" cy="285" r="12" fill="var(--color-primary)" opacity="var(--layer-3)"/>
    </g>

    <!-- Simple open circle on the left -->
    <g class="accent--blue" style="--visible-timing:calc(1200 - 35/400)">
        <path class="draw reverse" d="M -5 120 Q 300 -100 600 200 T 1205 215" fill="none" stroke="var(--color-primary)" opacity="var(--layer-2)" stroke-width="5" />
        <circle class="fade" cx="180" cy="35" r="20" fill="var(--color-primary)" opacity="var(--layer-3)"/>
        <circle class="fade pulse" cx="180" cy="35" r="30" fill="none" stroke="var(--color-primary)" opacity="var(--layer-2)" stroke-width="3"/>
        <circle class="fade" style="--visible-timing:calc(1200 - 200/400)" cx="600" cy="200" r="8" fill="var(--color-primary)" opacity="var(--layer-1)"/>
    </g>

    <g style="--visible-timing:calc(1200 - 203/400)">
        <path class="draw reverse" d="M -5 200 Q 350 280 650 220 T 1205 240" fill="none" stroke="var(--color-primary)" opacity="var(--layer-4)" stroke-width="2.1" />
        <circle class="fade" cx="1035" cy="203" r="5" fill="var(--color-primary)" opacity="var(--layer-1)"/>
    </g>

    <g>
        <path class="draw" d="M -5 360 Q 300 400 600 130 T 1205 310" fill="none" stroke="url(#accentGradient)" opacity="var(--layer-6)" stroke-width="8" />
    </g>

    <g style="--visible-timing:calc(245/400)">
        <path class="draw" d="M -5 280 Q 300 -180 600 200 T 1205 130" fill="none" stroke="url(#accentGradient)" opacity="var(--layer-3)" stroke-width="3.5" />
        <circle class="fade" cx="449" cy="245" r="6" fill="var(--color-primary)" opacity="var(--layer-6)"/>
        <circle class="fade" cx="450" cy="245" r="18" fill="none" stroke="var(--color-primary)" opacity="var(--layer-4)" stroke-width="2" />
        <circle class="fade" cx="450" cy="245" r="48" fill="none" stroke="url(#accentGradient)" opacity="var(--layer-6)" stroke-width="6" />
    </g>

    <!-- Binary code background texture -->
    <g font-family="monospace" font-size="14" fill="color-mix(in srgb, var(--theme--text--Color) 20%, transparent)">
        <g class="binary" data-lines="20" data-columns="1" data-x="0" data-y="0" font-size="16" style="letter-spacing:.2em;" fill="url(#accentGradient)" opacity="var(--layer-6)"></g>

        <g opacity="var(--layer-4)">
            <text x="800" y="60">The quick brown fox jumps over the lazy dog</text>
        </g>

        <g font-size="16" opacity="var(--layer-6)">
            <text x="300" y="150">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</text>
            <text x="300" y="180">Sed do eiusmod tempor incididunt ut labore et dolore magna</text>
            <text x="300" y="210">aliqua. Ut enim ad minim veniam, quis nostrud exercitation.</text>
        </g>

        <g class="binary" data-lines="1" data-columns="8" data-x="400" data-y="380" font-size="14" fill="url(#accentGradient)" style="letter-spacing:.2em;" opacity="var(--layer-6)"></g>
    </g>

    <!-- Decorative corner elements -->
    <polygon class="accent--orange" points="0,0 200,0 0,200" fill="url(#accentGradient)" opacity="var(--layer-1)" />

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const backgroundSVG = document.getElementById('background');
        // Create random binary sets for each text element
        const binaryGroups = backgroundSVG.querySelectorAll('.binary');
        binaryGroups.forEach(binaryGroup => {
            const lines     = parseInt(binaryGroup.dataset.lines ?? 1),
                  columns   = parseInt(binaryGroup.dataset.columns ?? 2),
                  x         = parseInt(binaryGroup.dataset.x ?? 0),
                  y         = parseInt(binaryGroup.dataset.y ?? 0),
                  fontSize  = parseInt(binaryGroup.getAttribute('font-size') ?? 14);

            for (let i = 0; i < lines; i++) {
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y + (i * fontSize) + 4);

                for (let j = 0; j < columns; j++) {
                    let char = '';
                    for (let k = 0; k < 8; k++) {
                        char += Math.random() < 0.5 ? '1' : '0';
                    }
                    text.innerHTML += `${char} `;
                }

                    binaryGroup.appendChild(text);
                }
            });
    });
    </script>
</svg>
