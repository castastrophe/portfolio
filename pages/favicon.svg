      }
      .slice:nth-of-type(4) {
        d: path("M 256,256 L 426.3,388.1 A 216 216 0 0 1 310,464.6 Z");
      }
      .slice:nth-of-type(5) {
        d: path("M 256,256 L 310,464.6 A 216 216 0 0 1 221,468.65 Z");
      }
      .slice:nth-of-type(6) {
        d: path("M 256,256 L 221,468.65 A 216 216 0 0 1 62.05,350 Z");
      }

      #outer {
        fill:var(--saucer-rim);
        stroke-width: var(--outline-thick);
        ry: calc(var(--center-y) - 20);
        rx: calc(var(--center-x) - 20);
      }

      #inner,
      #inner-outline {
        ry: calc(var(--center-y) - 40);
        rx: calc(var(--center-x) - 40);
      }

      #inner-outline {
        fill: transparent;
        stroke-width: 2;
      }
    }

    #mug {
      transform: translateX(-5%) translateY(-5%) scale(1.1);

      #handle {
        fill: var(--mug);
        fill-opacity:1;
        stroke:var(--outline);
        stroke-width: var(--outline-thick);
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-opacity:1;
        d: path("m 390,190 l 80,-8 l 10,40 l -80,35");
      }
      #shadow {
        opacity:0.3;
        fill:transparent;
        stroke:var(--shadow);
        stroke-width:20;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-opacity:1;
        filter:url(#filter7);
        d: path("M 400,250 a 146 146 0 0 1 -130,160");
      }
      #outer-circle {
        fill:var(--mug);
        fill-opacity:1;
        stroke:var(--outline);
        stroke-width: var(--outline-thick);
        stroke-linecap:butt;
        stroke-linejoin:miter;
        stroke-dasharray:none;
        stroke-opacity:1;
        rx: calc(var(--center-x) - 110);
        ry: calc(var(--center-y) - 110);
        cx: var(--center-x);
        cy: var(--center-y);
      }
      #inner-circle {
        /* Fill is coffee color */
        fill: var(--coffee);
        fill-opacity:1;
        stroke: var(--outline);
        stroke-width: var(--outline-thick);
        stroke-linecap:butt;
        stroke-linejoin:miter;
        stroke-opacity:1;
        rx: calc(var(--center-x) - 140);
        ry: calc(var(--center-y) - 140);
        cx: var(--center-x);
        cy: var(--center-y);
      }
      #inner-shadow {
        opacity:0.3;
        fill:transparent;
        stroke:var(--swirl, var(--outline));
        stroke-width:5;
        stroke-linecap:round;
        stroke-opacity:1;
        d: path("M 296,174 a 91 91 0 0 0 -130,100");
      }
      #swirl {
