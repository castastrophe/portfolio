  <style>
    :root {
      --outline: #320349;
      --mug: #e7e3d6;
      --coffee: #c2a998;
      --swirl: #614e42;
      --shadow: #000000;
      --saucer-rim: var(--mug);
      --saucer-color-1: #ff9a56;
      --saucer-color-2: #7bd1e6;
      --saucer-color-3: #c92c6b;
      --saucer-color-4: #ffd36c;
      --center-x: 256;
      --center-y: 256;
      --outline-thick: 5;
    }

    #saucer {
      ellipse {
        cy: var(--center-y);
        cx: var(--center-x);
      }

      .rim {
        stroke:var(--outline);
      }

      .slice {
        stroke:var(--outline);
        stroke-width:3;
        stroke-opacity: 0;
      }

      .color1 {
        fill:var(--saucer-color-1);
      }

      .color2 {
        fill:var(--saucer-color-2);
      }

      .color3 {
        fill:var(--saucer-color-3);
      }

      .color4 {
        fill:var(--saucer-color-4);
      }
      
      .slice:nth-of-type(1) {
        d: path("M 256,256 l -16,-216 a 216 216 0 0 1 93.9,15 Z");
      }
