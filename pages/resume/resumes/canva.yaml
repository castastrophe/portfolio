tagline: "Staff Frontend Engineer & Design Systems Leader"

addressee: "Canva Design System Team"
cover: |
  I'm excited to apply for the Staff Frontend Engineer - Design Systems role. With 12+ years 
  leading design systems at scale—including Spectrum at Adobe & PatternFly Elements at Red Hat—I'm 
  passionate about evolving foundational components that empower teams to build consistent, 
  accessible experiences.
  
  At Adobe, I led strategic technical direction for Spectrum, serving flagship products used by 
  millions. I balanced big-picture thinking with implementation details, mentored team members 
  through active code reviews, & fostered a culture of technical excellence. I explored how AI 
  can improve developer workflows, leading the Spectrum AI Working Group & building tooling that 
  enhanced productivity. My work on accessibility (WCAG AA) & cross-platform implementations 
  directly addressed problems at current & future scale.
  
  At Red Hat, I founded & led PatternFly Elements, driving adoption across organizations & 
  collaborating with Google, IBM, Fidelity, & Penn State. I broke down complex problems into 
  actionable solutions, advocated for design system goals, & delivered large cross-functional 
  projects that increased component adoption. My platform stewardship work built distributed 
  theming architecture enabling consistent branding across disparate applications.
  
  What excites me most about this role is the opportunity to future-proof Canva's design system 
  while serving as the interface between emerging needs & system evolution. I'm particularly 
  drawn to working on accessibility, theming, surface architecture, & powering AI workflows—areas 
  where I have deep expertise & genuine curiosity.
  
  I'm eager to contribute to Canva's mission of building a world-class design system that 
  revolutionizes ways of working across design & frontend engineering. My experience breaking 
  down undefined problems, advocating for technical changes, & fostering cross-functional 
  collaboration aligns perfectly with what you're looking for.
  
  Thank you for considering my application. I'd welcome the opportunity to discuss how my 
  experience can help take Canva's design system to the next level of maturity.

about: |
  Staff Frontend Engineer with 12+ years leading design systems at scale, evolving 
  foundational components & platform infrastructure that empower teams to build 
  consistent, accessible experiences. W3C CSS Working Group member with proven track 
  record of driving strategic technical direction, breaking down complex problems, & 
  delivering large cross-functional projects. Deep expertise in accessibility (WCAG 2.2 AA), 
  AI-enhanced developer workflows, & fostering technical excellence through mentorship & 
  knowledge sharing. Passionate about platform stewardship, cross-functional collaboration, 
  & advocating for design system evolution that serves users, designers, & engineers alike.

